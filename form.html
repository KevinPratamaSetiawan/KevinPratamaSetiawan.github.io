<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pendaftaran - Pemrograman Web</title>

    <link rel="stylesheet" href="form.css">
</head>
<body>
    <Header>
        <img src="https://www.itera.ac.id/wp-content/uploads/2021/04/cropped-pict-1.png" alt="">
        <h4>IF3028</h4>
        <h4>Mata kuliah <br> Pemrograman Web</h4>
    </Header>

    <div class="main_container">
        <div>
            <form method="get">
                <div class="content">
                    <h2>Form Pendaftaran</h2>
                </div>

                <div class="content content1">
                    <h3>Data Diri</h3>
                    <table>
                        <tr>
                            <td><label for="nim">NIM</label></td>
                            <td>:</td>
                            <td><input type="number" id="nim" name="nim" required></td>
                        </tr>
                        <tr>
                            <td><label for="nama">Nama Lengkap</label></td>
                            <td>:</td>
                            <td><input type="text" id="nama" name="nama" required></td>
                        </tr>
                        <tr>
                            <td><label for="prodi">Program Studi</label></td>
                            <td>:</td>
                            <td><input type="text" id="prodi" name="prodi" required></td>
                        </tr>
                        <tr>
                            <td><label for="email">Email Sekolah</label></td>
                            <td>:</td>
                            <td><input type="email" id="email" name="email" required></td>
                        </tr>
                        <tr>
                            <td><label for="password">Password</label></td>
                            <td>:</td>
                            <td><input type="password" id="password" name="password" required></td>
                        </tr>
                        <tr>
                            <td><label for="jkelamin">Jenis Kelamin</label></td>
                            <td>:</td>
                            <td><input type="radio" id="llaki" value="Laki-laki" name="jkelamin" required>
                            <label for="llaki">Laki-laki</label>
                            </td>
                            <td><input type="radio" id="perempuan" value="Perempuan" name="jkelamin" required>
                            <label for="perempuan">Perempuan</label>
                            </td>
                        </tr>

                        <tr>
                            <td><label for="tlahir"></label>Tanggal Lahir</td>
                            <td>:</td>
                            <td><input type="date" id="tlahir" name="tlahir" required></td>
                        </tr>
                        <tr>
                            <td><label for="alamat">Alamat</label></td>
                            <td>:</td>
                            <td><textarea name="alamat" id="alamat" cols="20" rows="5" required></textarea></td>
                        </tr>
                    </table>

                    <br>
                    <h3><label for="kelas">Kelas</label></h3>
                    <table>
                        <tr>
                            <td><input type="radio" id="RA" value="RA" name="kelas" required>
                                <label for="RA">RA</label>
                            </td>
                            <td><input type="radio" id="RB" value="RB" name="kelas" required>
                                <label for="RB">RB</label>
                            </td>
                            <td><input type="radio" id="RC" value="RC" name="kelas" required>
                                <label for="RC">RC</label>
                            </td>
                            <td><input type="radio" id="RD" value="RD" name="kelas" required>
                                <label for="RD">RD</label>
                            </td>
                        </tr>
                    </table>
                </div>
                <div class="content content2">
                    <table id="btn_table">
                        <tr>
                            <td><input type="button" value="RESET" id="res_btn" onclick="window.location.reload()"></td>
                            <td><input type="submit" value="DAFTAR" id="sub_btn"></td>
                        </tr>
                    </table>
                </div>
            </form>
        </div>

            <aside class="content">
                <h3>Pemrograman Web</h3>
                <ul>
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="form.html">Pendaftaran</a></li>
                    <li><a href="tabel.html">Partisipan</a></li>
                </ul>
            </aside>
    </div>

    <Footer>
        <div class="footer1">
            <h3>INSTITUT TEKNOLOGI SUMATERA</h3>
            <h5 class="op">Copyright © 2023 Institut Teknologi Sumatera</h5>
            <ul>
                <li><a href="#">About</a></li>
                <li class="op">|</li>
                <li><a href="#">Privacy & Policy</a></li>
                <li class="op">|</li>
                <li><a href="#">Security</a></li>
            </ul>
        </div>
    </Footer>
</body>
</html>
